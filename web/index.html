  <!-- ═══════════════════════════════════════════
       LOADING SPLASH – eliminates blank-screen FOUC
       while Flutter WASM/JS engine boots
  ═══════════════════════════════════════════ -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0D1117;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #flutter-loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0D1117 0%, #1a1f35 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #flutter-loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loader-logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .loader-logo span { color: #5C6BC0; }

    .loader-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #5C6BC0;
      border-radius: 50%;
      animation: splash-spin 0.8s linear infinite;
    }

    @keyframes splash-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Splash shown while Flutter engine boots — fades out on first frame -->
  <div id="flutter-loading-screen" aria-hidden="true">
    <p class="loader-logo">TIT<span>&amp;S</span></p>
    <div class="loader-spinner"></div>
  </div>

  <script>
    // Dismiss splash as soon as Flutter renders its first frame
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('flutter-loading-screen');
      if (el) {
        el.classList.add('fade-out');
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 450);
      }
    });
  </script>

  <!-- Vercel Insights & Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/analytics/script.js"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
